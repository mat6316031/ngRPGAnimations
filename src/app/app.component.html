<div style="">
  <img width="800" style="position: relative; " src="../assets/background.png"/>
  <div [class.wobble-hor-bottom]="css_hit" [class.rotate-center]="css_rotateCenter" [class.rotate-hor-top]="css_rotateHorTop" style="width: fit-content; position: absolute; top: 250px; left: 350px;">
    <img id="slimeyId" class="slime" width="150" [@death]="ng_death" [@attack]="ng_attack" [@b]="ng_b" [@s]="ng_s" [@f]="ng_f" src="../assets/sean-combs-rapper-kron-4-love-hip-hop-atlanta-kron-tv-daddy-removebg-preview.png"/>
  </div>
</div>
<div style="padding: 20px">
  <button *ngIf="!slimeIsPresent" mat-raised-button color="accent" (click)="spawn()">Spawn</button>
  <button *ngIf="slimeIsPresent" mat-raised-button color="accent" (click)="death()">Death</button>
  <button *ngIf="slimeIsPresent" mat-raised-button color="accent" (click)="attack()">Attack</button>
  <button *ngIf="slimeIsPresent" mat-raised-button color="accent" (click)="hit()">Hit</button>
  <button *ngIf="slimeIsPresent" mat-raised-button color="accent" (click)="bsf()">Bounce/Shake/Flip</button>
  <button *ngIf="slimeIsPresent" mat-raised-button color="accent" (click)="infinite()">Infinite Triple Spin</button>

</div>
